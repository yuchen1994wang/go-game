<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对弈 - 围棋对弈复盘</title>
  <meta name="description" content="围棋在线对弈，支持19路、13路、9路棋盘">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,死活题,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">

  <meta property="og:title" content="对弈 - 围棋对弈复盘">
  <meta property="og:description" content="围棋在线对弈，支持19路、13路、9路棋盘">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .game-page { display: flex; flex-direction: column; min-height: 100vh; }
    .game-info { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; color: var(--text-secondary); }
    .game-info-item { display: flex; align-items: center; gap: 6px; }
    .player-info { display: flex; align-items: center; gap: 8px; }
    .player-dot { width: 12px; height: 12px; border-radius: 50%; }
    .player-dot.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); }
    .player-dot.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); border: 1px solid rgba(0,0,0,0.1); }
    .current-turn { padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
    .current-turn.black { background: var(--stone-black); color: white; }
    .current-turn.white { background: var(--stone-white); color: var(--text-primary); border: 1px solid var(--border-color); }
    main { flex: 1; display: flex; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .board-section { flex: 1; display: flex; align-items: center; justify-content: center; }
    .board-wrapper { position: relative; background: linear-gradient(145deg, var(--board-wood-light) 0%, var(--board-wood) 50%, var(--board-dark) 100%); border-radius: 8px; padding: 30px; box-shadow: var(--shadow-medium); }
    .goban { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); border-radius: 4px; overflow: visible; }
    .board-grid { position: absolute; top: 0; left: 0; pointer-events: none; }
    .grid-line { stroke: var(--line-color); stroke-width: 1; opacity: 0.7; }
    .star-point { fill: var(--line-color); }
    .board-coords { position: absolute; display: flex; justify-content: space-between; pointer-events: none; }
    .coord-label { font-size: 10px; color: var(--line-color); font-family: 'JetBrains Mono', monospace; text-align: center; }
    .coord-top { top: -20px; left: 30px; right: 30px; }
    .coord-bottom { bottom: -20px; left: 30px; right: 30px; }
    .coord-left { left: -20px; top: 30px; bottom: 30px; flex-direction: column; }
    .coord-right { right: -20px; top: 30px; bottom: 30px; flex-direction: column; }
    .intersection { position: absolute; width: 40px; height: 40px; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .intersection:hover::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(102, 126, 234, 0.3); pointer-events: none; }
    .stone { width: 36px; height: 36px; border-radius: 50%; position: absolute; transform: scale(0); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 20; }
    .stone.visible { transform: scale(1); }
    .stone.black { background: radial-gradient(circle at 30% 30%, var(--stone-black-highlight), var(--stone-black) 60%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4); }
    .stone.white { background: radial-gradient(circle at 30% 30%, #ffffff, var(--stone-white) 50%, var(--stone-white-shadow) 100%); box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.1); }
    .stone.last-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background: var(--accent-red); box-shadow: 0 0 6px rgba(196, 30, 58, 0.8); animation: lastMovePulse 1.5s ease-in-out infinite; }
    @keyframes lastMovePulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
    }
    .stone .move-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; z-index: 25; pointer-events: none; }
    .stone.black .move-number { color: rgba(255,255,255,0.9); }
    .stone.white .move-number { color: rgba(0,0,0,0.8); }
    .stone.preview { opacity: 0.5; transform: scale(1) !important; pointer-events: none; }
    .control-panel { width: 380px; background: var(--panel-bg); border-radius: 16px; box-shadow: var(--shadow-medium); border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; max-height: calc(100vh - 140px); }
    .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .panel-section:last-child { border-bottom: none; }
    .panel-title { font-family: 'Noto Serif SC', serif; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
    .game-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .control-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .control-btn:hover { background: var(--border-color); }
    .control-btn.primary { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
    .control-btn.primary:hover { background: #D4A017; }
    .control-btn.danger { background: #FFEBEE; color: #C62828; border-color: #EF9A9A; }
    .control-btn.danger:hover { background: #FFCDD2; }
    .control-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .game-status { padding: 12px; background: var(--bg-secondary); border-radius: 10px; font-size: 0.9rem; }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: var(--text-secondary); }
    .status-value { font-weight: 600; }
    .status-value.black { color: var(--stone-black); }
    .status-value.white { color: var(--stone-white-shadow); }
    .move-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
    .move-item { padding: 6px 10px; background: var(--bg-secondary); border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; }
    .move-item:hover { background: var(--border-color); }
    .move-item.active { background: var(--accent-gold); color: white; }
    .move-item-num { min-width: 28px; font-family: 'JetBrains Mono', monospace; }
    .move-item-stone { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .move-item-stone.black { background: var(--stone-black); }
    .move-item-stone.white { background: var(--stone-white); border: 1px solid var(--stone-white-shadow); }
    .move-item-coord { flex: 1; }
    .pass-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-secondary); font-family: inherit; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .pass-btn:hover { background: var(--border-color); color: var(--text-primary); }
    .pass-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .resign-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #EF9A9A; background: #FFEBEE; color: #C62828; font-family: inherit; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .resign-btn:hover { background: #FFCDD2; }
    .resign-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 600; }
    .timer-display.warning { color: #C62828; }
    .timer-display.paused { opacity: 0.5; }
    .score-display { font-size: 1.1rem; font-weight: 600; }
    .pause-overlay { 
      position: absolute; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background: rgba(0, 0, 0, 0.9); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      border-radius: 8px; 
      z-index: 100; 
      opacity: 0; 
      visibility: hidden; 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      backdrop-filter: blur(4px); 
    }
    .pause-overlay.active { 
      opacity: 1; 
      visibility: visible; 
    }
    .pause-overlay-content {
      text-align: center;
      color: white;
      padding: 40px 60px;
      background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .pause-overlay-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(196, 163, 90, 0.6));
    }
    .pause-overlay-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      font-family: 'Noto Serif SC', serif;
      color: #C4A35A;
      text-shadow: 0 2px 10px rgba(196, 163, 90, 0.3);
    }
    .pause-overlay-subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.05em;
    }
    @keyframes pulse {
      0%, 100% { 
        transform: scale(1); 
        filter: drop-shadow(0 0 20px rgba(196, 163, 90, 0.6));
      }
      50% { 
        transform: scale(1.08); 
        filter: drop-shadow(0 0 30px rgba(196, 163, 90, 0.9));
      }
    }
    @media (max-width: 900px) { main { flex-direction: column; } .control-panel { width: 100%; max-height: none; } }
  </style>
</head>
<body>

  <div class="game-page">
    <header>
      <div class="header-left">
        <a href="home.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;" aria-label="返回首页">← 返回首页</a>

  <script src="../js/utils.js?v=6"></script>
  <script src="../js/error-handler.js?v=6"></script>
  <script src="../js/loading.js?v=6"></script>

  <script src="../js/analytics.js?v=6"></script>

  <script src="../js/game.js?v=6"></script>

  <script src="../js/ai.js?v=6"></script>
  <script src="../js/header.js?v=6"></script>
  <script>
    // 使用 theme.js 中的 SoundManager

    class GameApp {
      constructor() {
        this.game = null;
        this.gameId = null;
        this.cellSize = 40;
        this.boardPadding = 30;
        this.letters = 'ABCDEFGHJKLMNOPQRST';
        this.moveHistory = [];
        this.currentMove = -1;
        this.blackCaptures = 0;
        this.whiteCaptures = 0;
        this.blackTime = 0;
        this.whiteTime = 0;
        this.timerInterval = null;
        this.isPaused = false;
        this.consecutivePasses = 0;
        this.isGameOver = false;
        this.blackPlayer = '黑方';
        this.whitePlayer = '白方';
        this.gameType = 'human';
        this.komi = 6.5;

        this.init();
      }

      init() {
        Header.init({ showSettings: true });
        this.loadGameConfig();
        this.initGame();
        this.renderBoard();
        this.renderCoords();
        this.updateUI();
        this.bindEvents();
        this.startTimer();
      }

      loadGameConfig() {
        const urlParams = new URLSearchParams(window.location.search);
        const size = parseInt(urlParams.get('size')) || 19;
        const handicap = parseInt(urlParams.get('handicap')) || 0;
        const komi = parseFloat(urlParams.get('komi')) || 6.5;
        const blackPlayer = urlParams.get('black') || Storage.getUsername() || '黑方';
        const whitePlayer = urlParams.get('white') || '白方';
        const gameType = urlParams.get('type') || 'human';

        this.gameConfig = { size, handicap, komi, blackPlayer, whitePlayer, gameType };
        this.blackPlayer = blackPlayer;
        this.whitePlayer = whitePlayer;
        this.gameType = gameType;
        this.komi = komi;

        document.getElementById('blackPlayerName').textContent = blackPlayer;
        document.getElementById('whitePlayerName').textContent = whitePlayer;
        document.getElementById('boardSize').textContent = `${size}×${size}`;
      }

      initGame() {
        const { size, handicap } = this.gameConfig;
        this.game = new GoGame(size);
        this.gameId = Date.now().toString();

        if (handicap > 0) {
          const handicapStones = this.getHandicapStones(size, handicap);
          handicapStones.forEach(([x, y]) => {
            this.game.board[y][x] = 1;
          });
          this.game.currentPlayer = 2;
        }
      }

      getHandicapStones(size, count) {
        const stones = {
          9: { 2: [[2, 2], [6, 6]], 3: [[2, 2], [6, 6], [2, 6]], 4: [[2, 2], [6, 6], [2, 6], [6, 2]], 5: [[2, 2], [6, 6], [2, 6], [6, 2], [4, 4]] },
          13: { 2: [[3, 3], [9, 9]], 3: [[3, 3], [9, 9], [3, 9]], 4: [[3, 3], [9, 9], [3, 9], [9, 3]], 5: [[3, 3], [9, 9], [3, 9], [9, 3], [6, 6]] },
          19: { 2: [[3, 3], [15, 15]], 3: [[3, 3], [15, 15], [3, 15]], 4: [[3, 3], [15, 15], [3, 15], [15, 3]], 5: [[3, 3], [15, 15], [3, 15], [15, 3], [9, 9]], 6: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9]], 7: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9], [9, 9]], 8: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9], [9, 3], [9, 15]], 9: [[3, 3], [15, 15], [3, 15], [15, 3], [3, 9], [15, 9], [9, 3], [9, 15], [9, 9]] }
        };
        return (stones[size] && stones[size][count]) || [];
      }

      renderBoard() {
        const goban = document.getElementById('goban');
        const size = this.game.size;
        const boardSize = this.cellSize * (size - 1) + this.boardPadding * 2;

        goban.style.width = `${boardSize}px`;
        goban.style.height = `${boardSize}px`;
        goban.innerHTML = '';

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'board-grid');
        svg.setAttribute('width', boardSize);
        svg.setAttribute('height', boardSize);
        svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);

        for (let i = 0; i < size; i++) {
          const pos = this.boardPadding + i * this.cellSize;
          const hLine = document.createElementNS(svgNS, 'line');
          hLine.setAttribute('class', 'grid-line');
          hLine.setAttribute('x1', this.boardPadding);
          hLine.setAttribute('y1', pos);
          hLine.setAttribute('x2', boardSize - this.boardPadding);
          hLine.setAttribute('y2', pos);
          svg.appendChild(hLine);

          const vLine = document.createElementNS(svgNS, 'line');
          vLine.setAttribute('class', 'grid-line');
          vLine.setAttribute('x1', pos);
          vLine.setAttribute('y1', this.boardPadding);
          vLine.setAttribute('x2', pos);
          vLine.setAttribute('y2', boardSize - this.boardPadding);
          svg.appendChild(vLine);
        }

        const starPoints = this.getStarPoints(size);
        starPoints.forEach(([x, y]) => {
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('class', 'star-point');
          circle.setAttribute('cx', this.boardPadding + x * this.cellSize);
          circle.setAttribute('cy', this.boardPadding + y * this.cellSize);
          circle.setAttribute('r', size === 9 ? 4 : 3);
          svg.appendChild(circle);
        });

        goban.appendChild(svg);

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const intersection = document.createElement('div');
            intersection.className = 'intersection';
            intersection.dataset.x = x;
            intersection.dataset.y = y;
            intersection.style.left = `${this.boardPadding + x * this.cellSize}px`;
            intersection.style.top = `${this.boardPadding + y * this.cellSize}px`;
            goban.appendChild(intersection);
          }
        }

        this.updateBoard();
      }

      renderCoords() {
        const goban = document.getElementById('goban');
        const size = this.game.size;

        const topCoords = document.createElement('div');
        topCoords.className = 'board-coords coord-top';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = this.letters[i] || '';
          topCoords.appendChild(label);
        }
        goban.appendChild(topCoords);

        const bottomCoords = document.createElement('div');
        bottomCoords.className = 'board-coords coord-bottom';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = this.letters[i] || '';
          bottomCoords.appendChild(label);
        }
        goban.appendChild(bottomCoords);

        const leftCoords = document.createElement('div');
        leftCoords.className = 'board-coords coord-left';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = size - i;
          leftCoords.appendChild(label);
        }
        goban.appendChild(leftCoords);

        const rightCoords = document.createElement('div');
        rightCoords.className = 'board-coords coord-right';
        for (let i = 0; i < size; i++) {
          const label = document.createElement('span');
          label.className = 'coord-label';
          label.textContent = size - i;
          rightCoords.appendChild(label);
        }
        goban.appendChild(rightCoords);
      }

      getStarPoints(size) {
        const points = [];
        if (size === 9) {
          points.push([2, 2], [2, 6], [4, 4], [6, 2], [6, 6]);
        } else if (size === 13) {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 3, 3 + j * 3]);
            }
          }
        } else {
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              points.push([3 + i * 6, 3 + j * 6]);
            }
          }
        }
        return points;
      }

      updateBoard() {
        const size = this.game.size;
        const intersections = document.querySelectorAll('.intersection');

        intersections.forEach(intersection => {
          const x = parseInt(intersection.dataset.x);
          const y = parseInt(intersection.dataset.y);
          const stone = intersection.querySelector('.stone');

          if (stone) {stone.remove();}

          const cellValue = this.game.board[y][x];
          if (cellValue !== 0) {
            const stoneColor = cellValue === 1 ? 'black' : 'white';
            const isLastMove = this.moveHistory.length > 0 &&
              this.moveHistory[this.moveHistory.length - 1].x === x &&
              this.moveHistory[this.moveHistory.length - 1].y === y;

            const newStone = document.createElement('div');
            newStone.className = `stone ${stoneColor}${isLastMove ? ' last-move' : ''}`;
            intersection.appendChild(newStone);
            requestAnimationFrame(() => newStone.classList.add('visible'));
          }
        });
      }

      handleClick(x, y) {
        if (this.isGameOver || this.isPaused) {return;}

        const result = this.game.makeMove(x, y);
        if (!result.success) {
          showToast(result.message, 'warning');
          return;
        }

        SoundManager.playStone();

        if (result.captures && result.captures.length > 0) {
          SoundManager.playCapture(result.captures.length);
          if (this.game.currentPlayer === 2) {
            this.blackCaptures += result.captures.length;
          } else {
            this.whiteCaptures += result.captures.length;
          }
        }

        this.moveHistory.push({ x, y, player: this.game.currentPlayer === 2 ? 1 : 2, captures: result.captures || [] });
        this.currentMove = this.moveHistory.length - 1;
        this.consecutivePasses = 0;

        this.updateBoard();
        this.updateUI();
        this.renderMoveList();
      }

      handlePass() {
        if (this.isGameOver || this.isPaused) {return;}

        SoundManager.playPass();
        this.moveHistory.push({ x: -1, y: -1, player: this.game.currentPlayer, isPass: true });
        this.currentMove = this.moveHistory.length - 1;
        this.consecutivePasses++;

        if (this.consecutivePasses >= 2) {
          this.endGame('双方连续停手，对局结束');
          return;
        }

        this.game.currentPlayer = this.game.currentPlayer === 1 ? 2 : 1;
        this.updateUI();
        this.renderMoveList();
        showToast(`${this.game.currentPlayer === 1 ? '黑棋' : '白棋'}停一手`, 'info');
      }

      handleUndo() {
        if (this.isGameOver || this.moveHistory.length === 0) {return;}

        const lastMove = this.moveHistory.pop();
        this.currentMove = this.moveHistory.length - 1;

        if (lastMove.isPass) {
          this.game.currentPlayer = lastMove.player;
          this.consecutivePasses--;
        } else {
          this.game.board[lastMove.y][lastMove.x] = 0;
          if (lastMove.captures) {
            lastMove.captures.forEach(([x, y]) => {
              this.game.board[y][x] = lastMove.player === 1 ? 2 : 1;
            });
            if (lastMove.player === 1) {
              this.whiteCaptures -= lastMove.captures.length;
            } else {
              this.blackCaptures -= lastMove.captures.length;
            }
          }
          this.game.currentPlayer = lastMove.player;
        }

        this.updateBoard();
        this.updateUI();
        this.renderMoveList();
        showToast('已悔棋', 'info');
      }

      handleResign() {
        if (this.isGameOver) {return;}
        if (!confirm('确定要认输吗？')) {return;}

        const winner = this.game.currentPlayer === 1 ? '白棋' : '黑棋';
        this.endGame(`${this.game.currentPlayer === 1 ? '黑棋' : '白棋'}认输，${winner}获胜`);
      }

      handlePause() {
        if (this.isGameOver) {return;}
        this.isPaused = !this.isPaused;
        document.getElementById('pauseBtn').textContent = this.isPaused ? '▶️ 续盘' : '⏸ 封盘';
        document.getElementById('pauseOverlay').classList.toggle('active', this.isPaused);
        showToast(this.isPaused ? '已封盘' : '已续盘', 'info');
      }

      handleSave() {
        const gameData = {
          id: this.gameId,
          type: this.gameType,
          size: this.game.size,
          blackPlayer: this.blackPlayer,
          whitePlayer: this.whitePlayer,
          moveHistory: this.moveHistory,
          blackCaptures: this.blackCaptures,
          whiteCaptures: this.whiteCaptures,
          blackTime: this.blackTime,
          whiteTime: this.whiteTime,
          komi: this.komi,
          savedAt: Date.now(),
          isGameOver: this.isGameOver,
          result: this.gameResult || null
        };

        Storage.saveGame(gameData);
        showToast('对局已保存', 'success');
      }

      handleScore() {
        if (this.moveHistory.length === 0) {
          showToast('还没有落子，无法数棋', 'warning');
          return;
        }

        const score = this.game.calculateScore(this.komi);
        let resultText = '';
        if (score.winner === 'black') {
          resultText = `黑棋胜 ${score.margin.toFixed(1)} 目`;
        } else if (score.winner === 'white') {
          resultText = `白棋胜 ${score.margin.toFixed(1)} 目`;
        } else {
          resultText = '和棋';
        }

        showToast(`数棋结果：${resultText}`, 'info');
      }

      endGame(reason) {
        this.isGameOver = true;
        this.pauseTimer();

        const score = this.game.calculateScore(this.komi);
        let resultText = '';
        if (score.winner === 'black') {
          resultText = `黑棋胜 ${score.margin.toFixed(1)} 目`;
        } else if (score.winner === 'white') {
          resultText = `白棋胜 ${score.margin.toFixed(1)} 目`;
        } else {
          resultText = '和棋';
        }

        this.gameResult = {
          reason: reason,
          winner: score.winner,
          margin: score.margin,
          blackScore: score.black,
          whiteScore: score.white
        };

        showToast(`${reason}\n${resultText}`, 'success');
        this.updateUI();

        // 自动保存
        this.handleSave();
      }

      startTimer() {
        this.timerInterval = setInterval(() => {
          if (this.isPaused || this.isGameOver) {return;}

          if (this.game.currentPlayer === 1) {
            this.blackTime++;
          } else {
            this.whiteTime++;
          }

          this.updateTimerDisplay();
        }, 1000);
      }

      pauseTimer() {
        this.isPaused = true;
        if (this.timerInterval) {
          clearInterval(this.timerInterval);
          this.timerInterval = null;
        }
      }

      updateTimerDisplay() {
        const blackMins = Math.floor(this.blackTime / 60);
        const blackSecs = this.blackTime % 60;
        document.getElementById('blackTimer').textContent =
          `${String(blackMins).padStart(2, '0')}:${String(blackSecs).padStart(2, '0')}`;

        const whiteMins = Math.floor(this.whiteTime / 60);
        const whiteSecs = this.whiteTime % 60;
        document.getElementById('whiteTimer').textContent =
          `${String(whiteMins).padStart(2, '0')}:${String(whiteSecs).padStart(2, '0')}`;

        const totalTime = this.blackTime + this.whiteTime;
        const totalMins = Math.floor(totalTime / 60);
        const totalSecs = totalTime % 60;
        document.getElementById('gameTimer').textContent =
          `${String(totalMins).padStart(2, '0')}:${String(totalSecs).padStart(2, '0')}`;
      }

      updateUI() {
        const currentPlayer = this.game.currentPlayer;
        document.getElementById('currentTurn').textContent = currentPlayer === 1 ? '黑棋' : '白棋';
        document.getElementById('currentTurn').className = `status-value ${currentPlayer === 1 ? 'black' : 'white'}`;

        document.getElementById('blackTurn').style.display = currentPlayer === 1 ? 'inline' : 'none';
        document.getElementById('whiteTurn').style.display = currentPlayer === 2 ? 'inline' : 'none';

        document.getElementById('captures').textContent = `黑: ${this.blackCaptures} | 白: ${this.whiteCaptures}`;
        document.getElementById('moveCount').textContent = `${this.moveHistory.length}手`;

        document.getElementById('undoBtn').disabled = this.moveHistory.length === 0 || this.isGameOver;
        document.getElementById('passBtn').disabled = this.isGameOver;
        const pauseBtn = document.getElementById('pauseBtn');
        if (pauseBtn) {pauseBtn.disabled = this.isGameOver;}
        document.getElementById('scoreBtn').disabled = this.moveHistory.length === 0;

        this.updateTimerDisplay();
      }

      renderMoveList() {
        const list = document.getElementById('moveList');
        list.innerHTML = '';

        this.moveHistory.forEach((move, index) => {
          const item = document.createElement('div');
          item.className = 'move-item';
          item.dataset.index = index;

          const num = document.createElement('span');
          num.className = 'move-item-num';
          num.textContent = index + 1;

          const stone = document.createElement('span');
          stone.className = `move-item-stone ${move.player === 1 ? 'black' : 'white'}`;

          const coord = document.createElement('span');
          coord.className = 'move-item-coord';
          if (move.isPass) {
            coord.textContent = '停一手';
          } else {
            coord.textContent = `${this.letters[move.x]}${this.game.size - move.y}`;
          }

          item.appendChild(num);
          item.appendChild(stone);
          item.appendChild(coord);

          item.addEventListener('click', () => {
            this.goToMove(index);
          });

          list.appendChild(item);
        });

        // 滚动到底部
        list.scrollTop = list.scrollHeight;
      }

      goToMove(index) {
        if (index < 0 || index >= this.moveHistory.length) {return;}

        // 重置棋盘到指定步数
        this.game = new GoGame(this.game.size);
        this.blackCaptures = 0;
        this.whiteCaptures = 0;

        for (let i = 0; i <= index; i++) {
          const move = this.moveHistory[i];
          if (!move.isPass) {
            const result = this.game.makeMove(move.x, move.y);
            if (result.captures) {
              if (move.player === 1) {
                this.blackCaptures += result.captures.length;
              } else {
                this.whiteCaptures += result.captures.length;
              }
            }
          }
        }

        this.currentMove = index;
        this.updateBoard();
        this.updateUI();

        // 高亮当前手
        document.querySelectorAll('.move-item').forEach((item, i) => {
          item.classList.toggle('active', i === index);
        });
      }

      bindEvents() {
        const goban = document.getElementById('goban');
        const boardWrapper = document.querySelector('.board-wrapper');

        // 手势支持
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isGesturing = false;
        let lastTouchDistance = 0;
        let lastTouchCenter = { x: 0, y: 0 };

        if (boardWrapper) {
          boardWrapper.style.overflow = 'hidden';
          boardWrapper.style.touchAction = 'none';
          goban.style.transformOrigin = 'center center';
          goban.style.transition = 'transform 0.1s ease-out';

          const getTouchDistance = (touches) => {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
          };

          const getTouchCenter = (touches) => ({
            x: (touches[0].clientX + touches[1].clientX) / 2,
            y: (touches[0].clientY + touches[1].clientY) / 2
          });

          const constrainTranslation = () => {
            const rect = boardWrapper.getBoundingClientRect();
            const scaledWidth = rect.width * scale;
            const scaledHeight = rect.height * scale;
            const maxTranslateX = Math.max(0, (scaledWidth - rect.width) / 2);
            const maxTranslateY = Math.max(0, (scaledHeight - rect.height) / 2);
            translateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, translateX));
            translateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, translateY));
          };

          const applyTransform = () => {
            goban.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
          };

          boardWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
              isGesturing = true;
              lastTouchDistance = getTouchDistance(e.touches);
              lastTouchCenter = getTouchCenter(e.touches);
              e.preventDefault();
            } else if (e.touches.length === 1 && scale > 1) {
              lastTouchCenter = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
          }, { passive: false });

          boardWrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
              e.preventDefault();
              const distance = getTouchDistance(e.touches);
              const scaleDelta = distance / lastTouchDistance;
              scale = Math.max(1, Math.min(3, scale * scaleDelta));
              applyTransform();
              lastTouchDistance = distance;
            } else if (e.touches.length === 1 && scale > 1) {
              e.preventDefault();
              const touch = e.touches[0];
              translateX += touch.clientX - lastTouchCenter.x;
              translateY += touch.clientY - lastTouchCenter.y;
              constrainTranslation();
              applyTransform();
              lastTouchCenter = { x: touch.clientX, y: touch.clientY };
            }
          }, { passive: false });

          boardWrapper.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
              setTimeout(() => { isGesturing = false; }, 100);
            }
            if (e.touches.length === 0 && scale <= 1.05) {
              scale = 1; translateX = 0; translateY = 0;
              applyTransform();
            }
          });

          boardWrapper.addEventListener('dblclick', () => {
            scale = 1; translateX = 0; translateY = 0;
            applyTransform();
          });
        }

        goban.addEventListener('click', (e) => {
          if (isGesturing) return;
          const intersection = e.target.closest('.intersection');
          if (intersection) {
            const x = parseInt(intersection.dataset.x);
            const y = parseInt(intersection.dataset.y);
            this.handleClick(x, y);
          }
        });

        document.getElementById('undoBtn').addEventListener('click', () => this.handleUndo());
        document.getElementById('passBtn').addEventListener('click', () => this.handlePass());
        document.getElementById('pauseBtn').addEventListener('click', () => this.handlePause());
        document.getElementById('saveBtn').addEventListener('click', () => this.handleSave());
        document.getElementById('scoreBtn').addEventListener('click', () => this.handleScore());

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {return;}

          switch (e.key) {
            case 'z':
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                this.handleUndo();
              }
              break;
            case 'p':
              e.preventDefault();
              this.handlePass();
              break;
            case 's':
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                this.handleSave();
              }
              break;
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new GameApp();
    });
  </script>
