<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复盘分析 - 围棋对弈复盘</title>
  <meta name="description" content="AI辅助分析对局，找出关键手">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,死活题,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="复盘分析 - 围棋对弈复盘">
  <meta property="og:description" content="AI辅助分析对局，找出关键手">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .review-page { display: flex; flex-direction: column; min-height: 100vh; }
    header {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    main { flex: 1; padding: 32px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .page-title { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .page-subtitle { color: var(--text-secondary); margin-bottom: 32px; }
    .review-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .review-card { background: var(--panel-bg); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); transition: all 0.3s ease; }
    .review-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-medium); border-color: var(--accent-gold); }
    .review-card-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-bottom: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .review-card-title { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
    .review-card-desc { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin-bottom: 16px; }
    .review-card-btn { width: 100%; padding: 12px; border: none; background: var(--accent-gold); color: white; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .review-card-btn:hover { background: #D4A017; }
    .recent-games { background: var(--panel-bg); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); }
    .recent-games-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .recent-games-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 600; }
    .game-list { display: flex; flex-direction: column; gap: 12px; }
    .game-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-secondary); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .game-item:hover { background: var(--border-color); }
    .game-info { display: flex; align-items: center; gap: 16px; }
    .game-players { display: flex; align-items: center; gap: 8px; font-weight: 500; }
    .game-vs { color: var(--text-secondary); font-size: 0.85rem; }
    .game-meta { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text-secondary); }
    .analyze-btn { padding: 8px 16px; border: none; background: var(--accent-gold); color: white; border-radius: 8px; font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .analyze-btn:hover { background: #D4A017; }
    .empty-state { text-align: center; padding: 48px 24px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .ai-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 32px; }
    .ai-feature { text-align: center; padding: 20px; background: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color); }
    .ai-feature-icon { font-size: 2rem; margin-bottom: 8px; }
    .ai-feature-title { font-weight: 600; margin-bottom: 4px; }
    .ai-feature-desc { font-size: 0.85rem; color: var(--text-secondary); }
    @media (max-width: 768px) {
      .review-options { grid-template-columns: 1fr; }
      .game-item { flex-direction: column; align-items: flex-start; gap: 12px; }
      .analyze-btn { align-self: flex-end; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">跳过导航，进入主内容</a>
  <div class="review-page">
    <header>
      <div class="header-left">
        <a href="home.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;" aria-label="返回首页">← 返回首页</a>
        <h1 style="font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600;">复盘分析</h1>
      </div>
    </header>

    <main id="main-content">
      <h2 class="page-title">AI 复盘分析</h2>
      <p class="page-subtitle">利用AI技术分析您的对局，找出关键手和胜率变化</p>

      <div class="review-options">
        <div class="review-card">
          <div class="review-card-icon">📂</div>
          <h3 class="review-card-title">分析历史棋谱</h3>
          <p class="review-card-desc">从您保存的棋谱中选择一局进行AI分析，找出关键手和胜率变化</p>
          <button type="button" class="review-card-btn" id="analyzeHistoryBtn" aria-label="选择棋谱分析">选择棋谱</button>
        </div>

        <div class="review-card">
          <div class="review-card-icon">🤖</div>
          <h3 class="review-card-title">AI推荐变化图</h3>
          <p class="review-card-desc">AI将分析每一步棋，并给出当前局面的最佳变化图</p>
          <button type="button" class="review-card-btn" id="aiVariationBtn" aria-label="查看AI推荐变化图">查看变化图</button>
        </div>
      </div>

      <div class="recent-games">
        <div class="recent-games-header">
          <h3 class="recent-games-title">🎮 可分析的对局</h3>
        </div>
        <div class="game-list" id="gameList">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>暂无已保存的对局</p>
          </div>
        </div>
      </div>

      <div class="ai-features">
        <div class="ai-feature">
          <div class="ai-feature-icon">🔍</div>
          <div class="ai-feature-title">关键手分析</div>
          <div class="ai-feature-desc">自动识别对局中的关键手</div>
        </div>
        <div class="ai-feature">
          <div class="ai-feature-icon">📈</div>
          <div class="ai-feature-title">胜率变化</div>
          <div class="ai-feature-desc">展示每一步的胜率变化曲线</div>
        </div>
        <div class="ai-feature">
          <div class="ai-feature-icon">🎯</div>
          <div class="ai-feature-title">AI推荐</div>
          <div class="ai-feature-desc">给出当前局面AI认为的最佳选点</div>
        </div>
        <div class="ai-feature">
          <div class="ai-feature-icon">💡</div>
          <div class="ai-feature-title">棋理分析</div>
          <div class="ai-feature-desc">解释每一步的棋理和意图</div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/error-handler.js"></script>
  <script src="../js/loading.js"></script>
  <script src="../js/focus-manager.js"></script>
  <script src="../js/analytics.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/board-component.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/header.js"></script>
  <script>
    class ReviewApp {
      constructor() {
        this.init();
      }

      init() {
        Header.init();
        this.loadGames();
        this.bindEvents();
      }

      loadGames() {
        const games = Storage.getSavedGames();
        const list = document.getElementById('gameList');

        if (games.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <p>暂无已保存的对局</p>
            </div>
          `;
          return;
        }

        list.innerHTML = games.map(game => {
          const date = new Date(game.savedAt);
          const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;

          return `
            <div class="game-item" onclick="window.location.href='kifu-player.html?id=${game.id}'" role="button" tabindex="0" aria-label="查看对局：${game.blackPlayer} vs ${game.whitePlayer}">
              <div class="game-info">
                <div class="game-players">
                  <span>${game.blackPlayer}</span>
                  <span class="game-vs">VS</span>
                  <span>${game.whitePlayer}</span>
                </div>
              </div>
              <div class="game-meta">
                <span>${game.size}×${game.size}</span>
                <span>${dateStr}</span>
                <button type="button" class="analyze-btn" onclick="event.stopPropagation(); reviewApp.analyzeGame('${game.id}')" aria-label="分析这局棋">分析</button>
              </div>
            </div>
          `;
        }).join('');
      }

      analyzeGame(gameId) {
        showToast('AI分析功能开发中...', 'info');
      }

      bindEvents() {
        document.getElementById('analyzeHistoryBtn').addEventListener('click', () => {
          const games = Storage.getSavedGames();
          if (games.length === 0) {
            showToast('暂无可分析的对局', 'warning');
          } else {
            showToast('请选择一个对局进行分析', 'info');
          }
        });

        document.getElementById('aiVariationBtn').addEventListener('click', () => {
          showToast('AI变化图功能开发中...', 'info');
        });
      }
    }

    let reviewApp;
    document.addEventListener('DOMContentLoaded', () => {
      reviewApp = new ReviewApp();
    });
  </script>
</body>
</html>
