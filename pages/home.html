<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>围棋对弈复盘 - 在线围棋学习平台</title>
  <meta name="description" content="围棋对弈复盘 - 专业的在线围棋平台，支持AI对弈、棋谱管理和复盘分析">
  <meta name="keywords" content="围棋,围棋对弈,围棋学习,棋谱,AI对弈">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="围棋对弈复盘 - 在线围棋学习平台">
  <meta property="og:description" content="专业的在线围棋平台，支持AI对弈、棋谱管理和复盘分析">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .home-page { display: flex; flex-direction: column; min-height: 100vh; }
    .hero-section { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, var(--board-wood-light) 0%, var(--board-wood) 100%); }
    .hero-title { font-family: 'Noto Serif SC', serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
    .hero-subtitle { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 32px; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 32px 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .feature-card { background: var(--panel-bg); border-radius: 16px; padding: 24px; text-decoration: none; color: inherit; transition: all 0.3s ease; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; }
    .feature-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-medium); }
    .feature-icon { font-size: 2.5rem; }
    .feature-title { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 600; }
    .feature-desc { font-size: 0.9rem; color: var(--text-secondary); }
    .stats-section { padding: 24px 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-item { background: var(--panel-bg); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border-color); }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--primary-color); }
    .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
    .section-title { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; }
    @media (max-width: 768px) {
      .hero-title { font-size: 1.8rem; }
      .features-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">跳过导航，进入主内容</a>
  <div class="home-page">
    <div id="header-container"></div>

    <main id="main-content">
      <section class="hero-section">
        <div class="hero-title">围棋对弈</div>
      </section>

      <section class="features-grid">
        <a href="game.html" class="feature-card" aria-label="本地对弈">
          <div class="feature-icon">👥</div>
          <h2 class="feature-title">本地对弈</h2>
          <p class="feature-desc">与朋友在同一设备上进行对弈</p>
        </a>

        <a href="ai-setup.html" class="feature-card" aria-label="AI 对弈">
          <div class="feature-icon">🤖</div>
          <h2 class="feature-title">AI 对弈</h2>
          <p class="feature-desc">与不同难度的AI进行对弈，提升棋力</p>
        </a>

        <a href="kifu.html" class="feature-card" aria-label="棋谱管理">
          <div class="feature-icon">📚</div>
          <h2 class="feature-title">棋谱管理</h2>
          <p class="feature-desc">查看、管理和复盘您的棋谱</p>
        </a>

        <a href="pattern-list.html" class="feature-card" aria-label="定式库学习">
          <div class="feature-icon">📐</div>
          <h2 class="feature-title">定式库学习</h2>
          <p class="feature-desc">经典定式，包含练习和测试</p>
        </a>

        <a href="statistics.html" class="feature-card" aria-label="数据统计">
          <div class="feature-icon">📊</div>
          <h2 class="feature-title">数据统计</h2>
          <p class="feature-desc">查看学习进度、成长曲线和能力分析</p>
        </a>
      </section>

      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalGames">0</div>
            <div class="stat-label">对局数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="winRate">0%</div>
            <div class="stat-label">胜率</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="studyDays">1</div>
            <div class="stat-label">学习天数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalPatterns">0</div>
            <div class="stat-label">定式学习</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/utils.js?v=6"></script>
  <script src="../js/error-handler.js?v=6"></script>
  <script src="../js/loading.js?v=6"></script>
  <script src="../js/focus-manager.js?v=6"></script>
  <script src="../js/analytics.js?v=6"></script>
  <script src="../js/storage.js?v=6"></script>
  <script src="../js/storage-enhanced.js?v=6"></script>
  <script src="../js/theme.js?v=6"></script>
  <script src="../js/board-component.js?v=6"></script>
  <script src="../js/ai.js?v=6"></script>
  <script src="../js/header.js?v=6"></script>
  <script>
    class HomeApp {
      constructor() {
        this.init();
      }

      init() {
        Header.mount(document.getElementById('header-container'), {
          showSettings: true,
          showUser: true
        });
        this.loadUserInfo();
        this.loadStats();
        this.bindEvents();
      }

      loadUserInfo() {
        const username = Storage.getUsername();
        if (username) {
          const userNameEl = document.getElementById('userName');
          const welcomeNameEl = document.getElementById('welcomeName');
          if (userNameEl) userNameEl.textContent = username;
          if (welcomeNameEl) welcomeNameEl.textContent = username;
        }
      }

      loadStats() {
        const games = Storage.getSavedGames();

        document.getElementById('totalGames').textContent = games.length;
        document.getElementById('totalPatterns').textContent = '0';

        if (games.length > 0) {
          const myUsername = Storage.getUsername();
          const wins = games.filter(game => {
            if (game.result && game.result.winner) {
              const isBlack = game.blackPlayer === myUsername;
              return (isBlack && game.result.winner === 'black') ||
                     (!isBlack && game.result.winner === 'white');
            }
            return false;
          }).length;
          document.getElementById('winRate').textContent = Math.round((wins / games.length) * 100) + '%';
        }

        const firstVisit = localStorage.getItem('go_first_visit');
        if (firstVisit) {
          const days = Math.floor((Date.now() - parseInt(firstVisit)) / (1000 * 60 * 60 * 24)) + 1;
          document.getElementById('studyDays').textContent = days;
        } else {
          localStorage.setItem('go_first_visit', Date.now().toString());
        }
      }

      bindEvents() {
        // 绑定事件
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new HomeApp();
    });
  </script>
</body>
</html>
