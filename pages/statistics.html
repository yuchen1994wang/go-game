<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计 - 围棋对弈复盘</title>
  <meta name="description" content="查看您的学习统计、成长曲线和能力分析">
  <meta name="keywords" content="围棋,学习统计,数据可视化,围棋学习">
  <meta name="author" content="围棋对弈复盘">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="数据统计 - 围棋对弈复盘">
  <meta property="og:description" content="查看您的学习统计、成长曲线和能力分析">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#C4A35A">
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400,600,700&family=JetBrains+Mono:wght@400,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .stats-page { display: flex; flex-direction: column; min-height: 100vh; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    main { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page-title { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .stats-section { background: var(--panel-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); }
    .section-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .time-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .time-tab { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .time-tab:hover { border-color: var(--accent-gold); }
    .time-tab.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
    @media (max-width: 768px) {
      main { padding: 16px; }
      .page-title { font-size: 1.5rem; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">跳过导航，进入主内容</a>
  <div class="stats-page">
    <header>
      <div class="header-left">
        <a href="home.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;" aria-label="返回首页">← 返回首页</a>
        <h1 style="font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600;">数据统计</h1>
      </div>
    </header>

    <main id="main-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h2 class="page-title" style="margin-bottom:0;">📊 学习数据统计</h2>
        <button id="exportStatsBtn" class="btn btn-secondary" style="padding:8px 16px;font-size:0.9rem;" title="导出统计数据">📤 导出统计</button>
      </div>

      <div id="loadingState" class="stats-section" style="text-align:center;padding:60px 20px;">
        <div style="font-size:2rem;margin-bottom:16px;">⏳</div>
        <div style="color:var(--text-secondary);">正在加载统计数据...</div>
      </div>

      <div id="emptyState" class="stats-section" style="text-align:center;padding:60px 20px;display:none;">
        <div style="font-size:2rem;margin-bottom:16px;">📊</div>
        <div style="font-size:1.2rem;font-weight:600;margin-bottom:8px;">暂无统计数据</div>
        <div style="color:var(--text-secondary);margin-bottom:20px;">开始对弈或练习后，这里会显示您的学习数据</div>
        <a href="home.html" class="btn btn-primary">开始对弈</a>
      </div>

      <div id="statsContent" style="display:none;">
        <div id="statistics-panel" class="stats-section"></div>

        <div class="stats-grid">
          <div id="game-stats" class="stats-section"></div>
          <div id="practice-stats" class="stats-section"></div>
        </div>

        <div class="stats-grid">
          <div id="growth-chart" class="stats-section"></div>
          <div id="radar-chart" class="stats-section"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/utils.js?v=6"></script>
  <script src="../js/error-handler.js?v=6"></script>
  <script src="../js/loading.js?v=6"></script>
  <script src="../js/focus-manager.js?v=6"></script>
  <script src="../js/analytics.js?v=6"></script>
  <script src="../js/storage.js?v=6"></script>
  <script src="../js/theme.js?v=6"></script>
  <script src="../js/statistics.js?v=6"></script>
  <script src="../js/header.js?v=6"></script>
  <script>
    class StatsApp {
      constructor() {
        this.statsData = {};
        this.init();
      }

      init() {
        Header.init();
        this.loadAndRenderStats();
        this.bindEvents();
      }

      async loadAndRenderStats() {
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const statsContent = document.getElementById('statsContent');

        setTimeout(() => {
          this.statsData = {
            games: Storage.getSavedGames(),
            username: Storage.getUsername()
          };

          const hasData = this.statsData.games.length > 0;

          loadingState.style.display = 'none';

          if (!hasData) {
            emptyState.style.display = 'block';
          } else {
            statsContent.style.display = 'block';
            this.renderStats();
          }
        }, 300);
      }

      bindEvents() {
        document.getElementById('exportStatsBtn').addEventListener('click', () => {
          this.exportStats();
        });
      }

      exportStats() {
        const exportData = {
          exportedAt: new Date().toISOString(),
          username: this.statsData.username,
          summary: {
            totalGames: this.statsData.games.length,
            wins: this.statsData.games.filter(g => g.result === 'win').length,
            losses: this.statsData.games.filter(g => g.result === 'loss').length
          },
          games: this.statsData.games
        };

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `go-stats-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);

        if (typeof showToast === 'function') {
          showToast('统计数据已导出', 'success');
        }
      }

      renderStats() {
        const statsPanel = new StatisticsPanel('statistics-panel');
        statsPanel.render();

        const gameStats = new GameStats('game-stats');
        gameStats.render();

        const practiceStats = new PracticeStats('practice-stats');
        practiceStats.render();

        const growthChart = new GrowthChart('growth-chart');
        growthChart.setData();
        growthChart.render();

        const radarChart = new RadarChart('radar-chart');
        radarChart.render();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new StatsApp();
    });
  </script>
</body>
</html>
